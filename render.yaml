services:
  - type: web
    name: tradehouse
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_LIVEKIT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
